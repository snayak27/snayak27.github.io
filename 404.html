<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex">
  <title>404 — Page not found · Sashibhusan Nayak</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:#faf9f7;color:#1c1917;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden;}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.35;z-index:0;}
    .b1{width:600px;height:600px;background:radial-gradient(circle,#fed7aa,#fb923c);top:-160px;right:-160px;}
    .b2{width:500px;height:500px;background:radial-gradient(circle,#fef3c7,#fde68a);bottom:5%;left:-160px;}
    .box{position:relative;z-index:1;}
    .code{font-size:clamp(5rem,18vw,9rem);font-weight:800;line-height:1;letter-spacing:-.04em;background:linear-gradient(135deg,#f97316,#ea580c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    h1{font-size:clamp(1.3rem,3vw,1.8rem);font-weight:800;letter-spacing:-.02em;margin:8px 0 12px;}
    p{font-size:1rem;color:#57534e;max-width:420px;margin:0 auto 32px;line-height:1.6;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:12px;background:#f97316;color:#fff;font-size:.92rem;font-weight:600;text-decoration:none;box-shadow:0 4px 14px rgba(249,115,22,.35);transition:all .2s;}
    .btn:hover{background:#ea580c;transform:translateY(-1px);box-shadow:0 6px 20px rgba(249,115,22,.45);}
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="box">
    <div class="code">404</div>
    <h1>This page wandered off.</h1>
    <p>The link you followed doesn't exist — but the rest of the ecosystem is very much alive.</p>
    <a class="btn" href="/">← Back to home</a>
  </div>
</body>
</html>
